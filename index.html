<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#D4AF37" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SwapHub" />
  <meta name="description" content="Sacred Exchange — Swap Amulets" />
  <title>SwapHub</title>
  <link rel="manifest" href="manifest.json" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    :root {
      --gold: #D4AF37; --gold-light: #F4C430;
      --bg: #0A0A0A; --bg2: #1A1410; --bg3: #1e1a14;
      --text: #F5DEB3; --text2: #D4AF37;
      --border: rgba(212,175,55,0.2);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100vh; height: -webkit-fill-available; }
    #topbar { padding-top: calc(var(--safe-top) + 12px); background: #000; border-bottom: 1px solid var(--border); }
    #content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(70px + var(--safe-bottom)); }
    #bottomnav { position: fixed; bottom: 0; left: 0; right: 0; padding-bottom: var(--safe-bottom); background: #000; border-top: 1px solid #1a1510; z-index: 100; }
    .gold-text { background: linear-gradient(135deg, #D4AF37, #F4C430); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: transform 0.15s; }
    .card:active { transform: scale(0.97); }
    .card.featured { border-color: var(--gold); box-shadow: 0 0 12px rgba(212,175,55,0.2); }
    .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; flex: 1; cursor: pointer; color: #555; gap: 3px; transition: color 0.2s; }
    .nav-item.active { color: var(--gold); }
    .nav-item span { font-size: 10px; font-weight: 600; }
    .badge-pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .badge-gold { background: rgba(212,175,55,0.15); color: var(--gold); border: 1px solid rgba(212,175,55,0.3); }
    .badge-green { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .badge-blue { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
    .search-bar { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
    .search-bar input { background: none; border: none; outline: none; color: var(--text); flex: 1; font-size: 14px; }
    .search-bar input::placeholder { color: #555; }
    .pill { padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 600; border: 1px solid var(--border); background: var(--bg3); color: #888; cursor: pointer; white-space: nowrap; }
    .pill.active { background: var(--gold); color: #000; border-color: var(--gold); }
    .btn-gold { background: linear-gradient(135deg, #D4AF37, #F4C430); color: #000; font-weight: 700; border: none; border-radius: 10px; padding: 12px 20px; font-size: 14px; cursor: pointer; transition: opacity 0.15s; }
    .btn-gold:active { opacity: 0.85; }
    .btn-outline { background: transparent; color: var(--gold); font-weight: 600; border: 1px solid var(--gold); border-radius: 10px; padding: 10px 16px; font-size: 13px; cursor: pointer; }
    .page { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #D4AF37, #F4C430); display: flex; align-items: center; justify-content: center; font-weight: 700; color: #000; font-size: 16px; }
    .shimmer { background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .notif-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; position: absolute; top: 6px; right: calc(50% - 18px); }
    #toast { position: fixed; top: calc(var(--safe-top) + 70px); left: 50%; transform: translateX(-50%) translateY(-20px); background: #1a1a1a; border: 1px solid var(--gold); color: var(--text); padding: 10px 20px; border-radius: 10px; font-size: 13px; z-index: 999; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .listing-img-placeholder { width: 100%; aspect-ratio: 1; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 40px; }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; text-align: center; }
    ::-webkit-scrollbar { display: none; }

    /* ===== AUTH SCREEN ===== */
    #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 500; display: flex; flex-direction: column; overflow-y: auto; }
    .auth-input-wrap { display: flex; align-items: center; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 0 14px; gap: 10px; }
    .auth-input-wrap input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 15px; padding: 13px 0; }
    .auth-input-wrap input::placeholder { color: #555; }
    .auth-tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 8px; transition: all 0.2s; color: #666; }
    .auth-tab.active { background: var(--gold); color: #000; }

    /* ===== CHAT SCREEN ===== */
    #chat-screen { position: fixed; inset: 0; background: var(--bg); z-index: 400; display: flex; flex-direction: column; }
    .msg-bubble { max-width: 75%; padding: 10px 13px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
    .msg-mine { background: var(--gold); color: #000; border-bottom-right-radius: 4px; align-self: flex-end; }
    .msg-theirs { background: var(--bg2); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; align-self: flex-start; }
    #chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    #chat-input-bar { padding: 12px; padding-bottom: calc(12px + var(--safe-bottom)); background: var(--bg2); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; }
    #chat-input-bar input { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; color: var(--text); font-size: 14px; outline: none; }
    .send-btn { width: 40px; height: 40px; border-radius: 11px; background: var(--gold); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .send-btn:disabled { background: #2a2a2a; }
  </style>
</head>
<body>

<!-- ===== AUTH SCREEN ===== -->
<div id="auth-screen">
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px;padding-top:60px;max-width:420px;margin:0 auto;width:100%">
    <!-- Logo -->
    <div style="text-align:center;margin-bottom:36px">
      <div style="width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#D4AF37,#F4C430);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 14px;box-shadow:0 0 24px rgba(212,175,55,0.4)">⛩️</div>
      <div class="gold-text" style="font-size:28px;font-weight:700">SwapHub</div>
      <div style="font-size:11px;color:#666;letter-spacing:2px;margin-top:2px">SACRED EXCHANGE</div>
    </div>

    <!-- Tabs -->
    <div style="background:var(--bg2);border-radius:12px;padding:3px;display:flex;margin-bottom:24px;border:1px solid var(--border)">
      <div class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Sign In</div>
      <div class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">Sign Up</div>
    </div>

    <!-- Name (signup) -->
    <div id="field-name" style="display:none;margin-bottom:16px">
      <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:8px">Full Name</div>
      <div class="auth-input-wrap">
        <i data-lucide="user" style="width:16px;height:16px;color:#555;flex-shrink:0"></i>
        <input id="auth-name" type="text" placeholder="Your full name" autocomplete="name" />
      </div>
    </div>

    <!-- Email -->
    <div style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:8px">Email Address</div>
      <div class="auth-input-wrap">
        <i data-lucide="mail" style="width:16px;height:16px;color:#555;flex-shrink:0"></i>
        <input id="auth-email" type="email" placeholder="you@example.com" autocomplete="email" />
      </div>
    </div>

    <!-- Password -->
    <div id="field-pass" style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:12px;font-weight:600;color:#888">Password</div>
        <button id="forgot-link" onclick="showForgot()" style="background:none;border:none;color:var(--gold);font-size:12px;cursor:pointer;font-weight:500">Forgot?</button>
      </div>
      <div class="auth-input-wrap">
        <i data-lucide="lock" style="width:16px;height:16px;color:#555;flex-shrink:0"></i>
        <input id="auth-pass" type="password" placeholder="Your password" autocomplete="current-password" />
        <button onclick="togglePass()" style="background:none;border:none;cursor:pointer;padding:0">
          <i data-lucide="eye" id="eye-icon" style="width:16px;height:16px;color:#555"></i>
        </button>
      </div>
    </div>

    <!-- Submit -->
    <button id="auth-submit-btn" class="btn-gold w-full mt-4" style="width:100%;margin-top:16px;padding:15px" onclick="submitAuth()">Sign In</button>

    <!-- Divider -->
    <div style="display:flex;align-items:center;gap:12px;margin:20px 0">
      <div style="flex:1;height:1px;background:var(--border)"></div>
      <span style="font-size:12px;color:#555">or</span>
      <div style="flex:1;height:1px;background:var(--border)"></div>
    </div>

    <!-- Google -->
    <button style="width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;color:var(--text);font-size:14px;font-weight:600" onclick="showToast('Google Sign In coming soon!')">
      🇬 Continue with Google
    </button>

    <!-- Demo login -->
    <button onclick="demoLogin()" style="width:100%;background:none;border:none;color:#555;font-size:12px;margin-top:16px;cursor:pointer;padding:8px">
      👀 Demo — skip login
    </button>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="app" style="display:none">
  <!-- Top Bar -->
  <div id="topbar" class="px-4 pb-3">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span style="font-size:22px">⛩️</span>
        <div>
          <div class="gold-text font-bold text-lg leading-tight">SwapHub</div>
          <div style="font-size:10px;color:#555">Sacred Exchange</div>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="requestPushPermission()" id="notif-btn" class="relative p-2 rounded-full" style="background:var(--bg3);border:none;cursor:pointer;">
          <i data-lucide="bell" style="width:18px;height:18px;color:var(--gold)"></i>
          <div class="notif-dot" id="notif-dot" style="display:none"></div>
        </button>
        <button onclick="showPage('profile')" class="avatar text-sm" id="user-avatar" style="border:none;cursor:pointer">M</button>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div id="content">
    <div id="page-home" class="page px-4 pt-4"></div>
    <div id="page-browse" class="page px-4 pt-4" style="display:none"></div>
    <div id="page-post" class="page px-4 pt-4" style="display:none"></div>
    <div id="page-orders" class="page px-4 pt-4" style="display:none"></div>
    <div id="page-profile" class="page px-4 pt-4" style="display:none"></div>
    <div id="page-notifications" class="page px-4 pt-4" style="display:none"></div>
    <div id="page-item-detail" class="page" style="display:none"></div>
  </div>

  <!-- Bottom Nav -->
  <div id="bottomnav">
    <div class="flex">
      <div class="nav-item active" id="nav-home" onclick="showPage('home')">
        <i data-lucide="home" style="width:22px;height:22px"></i><span>Home</span>
      </div>
      <div class="nav-item" id="nav-browse" onclick="showPage('browse')">
        <i data-lucide="search" style="width:22px;height:22px"></i><span>Browse</span>
      </div>
      <div class="nav-item" id="nav-post" onclick="showPage('post')">
        <div style="background:linear-gradient(135deg,#D4AF37,#F4C430);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(212,175,55,0.4)">
          <i data-lucide="plus" style="width:22px;height:22px;color:#000"></i>
        </div>
        <span>Post</span>
      </div>
      <div class="nav-item" id="nav-orders" onclick="showPage('orders')">
        <i data-lucide="package" style="width:22px;height:22px"></i><span>Orders</span>
      </div>
      <div class="nav-item" id="nav-profile" onclick="showPage('profile')">
        <i data-lucide="user" style="width:22px;height:22px"></i><span>Profile</span>
      </div>
    </div>
  </div>
</div>

<!-- ===== CHAT SCREEN ===== -->
<div id="chat-screen" style="display:none">
  <div style="background:#000;border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 14px) 16px 14px;display:flex;align-items:center;gap:12px">
    <button onclick="closeChat()" style="background:none;border:none;cursor:pointer;padding:0">
      <i data-lucide="arrow-left" style="width:20px;height:20px;color:var(--text)"></i>
    </button>
    <div style="width:36px;height:36px;border-radius:10px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:14px" id="chat-avatar">?</div>
    <div style="flex:1">
      <div style="font-weight:600;font-size:14px;color:var(--text)" id="chat-title">Chat</div>
      <div style="font-size:11px;color:#666" id="chat-subtitle">Item discussion</div>
    </div>
    <div style="width:8px;height:8px;background:#22c55e;border-radius:50%"></div>
  </div>

  <div id="chat-messages"></div>

  <div id="chat-input-bar">
    <input id="chat-input" type="text" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg()" />
    <button class="send-btn" onclick="sendMsg()" id="send-btn">
      <i data-lucide="send" style="width:16px;height:16px;color:#000"></i>
    </button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ===== STATE =====
const APP = {
  user: null,
  currentPage: 'home',
  chatMessages: [],
  chatPartner: null,
  chatItemTitle: null,
  chatOrderId: null,
  pollInterval: null,
  notifPermission: Notification?.permission || 'default',
};

const mockListings = [
  { id:1, title:'Luang Phor Thuad Amulet 2543', category:'Thai Amulets', condition:'Good', listing_type:'swap', icon:'🙏', is_boosted:true, looking_for:'LP Sothorn or similar' },
  { id:2, title:'Phra Somdej Wat Rakang', category:'Phra Somdej', condition:'Excellent', listing_type:'sell', sale_price:280, icon:'⛩️', is_boosted:false },
  { id:3, title:'Takrut Maha Ud - Ajarn Tim', category:'Takrut', condition:'Good', listing_type:'swap', icon:'📜', is_boosted:false },
  { id:4, title:'Jatukam Ramathep BE 2550', category:'Jatukam', condition:'Very Good', listing_type:'both', sale_price:150, icon:'💫', is_boosted:true },
  { id:5, title:'Phra Pidta Luang Phor Mun', category:'Phra Pidta', condition:'Fair', listing_type:'swap', icon:'🧘', is_boosted:false },
  { id:6, title:'Gold Takrut - Ajarn Chum', category:'Takrut', condition:'Excellent', listing_type:'sell', sale_price:420, icon:'📜', is_boosted:false },
];

const categories = [
  {name:'All',slug:'all',icon:'✨'},{name:'Thai Amulets',slug:'thai-amulets',icon:'🙏'},
  {name:'Phra Somdej',slug:'phra-somdej',icon:'⛩️'},{name:'Takrut',slug:'takrut',icon:'📜'},
  {name:'Phra Pidta',slug:'phra-pidta',icon:'🧘'},{name:'Jatukam',slug:'jatukam',icon:'💫'},
  {name:'Lockets',slug:'lockets',icon:'🔮'},{name:'Rings',slug:'rings',icon:'💍'},
];

// ===== AUTH =====
function switchAuthTab(mode) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + mode).classList.add('active');
  document.getElementById('field-name').style.display = mode === 'signup' ? 'block' : 'none';
  document.getElementById('auth-submit-btn').textContent = mode === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('forgot-link').style.display = mode === 'login' ? 'block' : 'none';
  document.getElementById('auth-submit-btn').dataset.mode = mode;
}

function togglePass() {
  const input = document.getElementById('auth-pass');
  input.type = input.type === 'password' ? 'text' : 'password';
}

function showForgot() {
  showToast('Password reset email sent! Check your inbox 📧');
}

async function submitAuth() {
  const mode = document.getElementById('auth-submit-btn').dataset.mode || 'login';
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  const name = document.getElementById('auth-name').value.trim();
  if (!email) { showToast('Please enter your email'); return; }
  if (!pass) { showToast('Please enter your password'); return; }
  if (mode === 'signup' && !name) { showToast('Please enter your name'); return; }
  document.getElementById('auth-submit-btn').textContent = '...';
  setTimeout(() => {
    APP.user = { email, name: name || email.split('@')[0], initials: (name || email)[0].toUpperCase() };
    document.getElementById('user-avatar').textContent = APP.user.initials;
    launchApp();
  }, 1000);
}

function demoLogin() {
  APP.user = { email: 'demo@swaphub.app', name: 'Demo User', initials: 'D' };
  document.getElementById('user-avatar').textContent = 'D';
  launchApp();
}

function launchApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  lucide.createIcons();
  renderHome();
  setTimeout(requestPushPermission, 2000);
}

// ===== PUSH NOTIFICATIONS =====
async function requestPushPermission() {
  if (!('Notification' in window)) { showToast('Push not supported in this browser'); return; }
  if (Notification.permission === 'granted') { showToast('🔔 Notifications already enabled!'); return; }
  if (Notification.permission === 'denied') { showToast('Notifications blocked — enable in browser settings'); return; }
  const perm = await Notification.requestPermission();
  APP.notifPermission = perm;
  if (perm === 'granted') {
    showToast('🔔 Notifications enabled!');
    document.getElementById('notif-dot').style.display = 'block';
    // Simulate welcome notification
    setTimeout(() => {
      sendPushNotification('🙏 Welcome to SwapHub!', 'Sacred Exchange is ready. Browse or post your first amulet!');
    }, 1500);
  }
}

function sendPushNotification(title, body, onClick = null) {
  if (Notification.permission !== 'granted') return;
  const notif = new Notification(title, {
    body,
    icon: '/icon-192.png',
    badge: '/icon-96.png',
    tag: 'swaphub-' + Date.now(),
    vibrate: [100, 50, 100],
  });
  if (onClick) notif.onclick = onClick;
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== NAV =====
function showPage(page) {
  document.querySelectorAll('[id^="page-"]').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const pageEl = document.getElementById('page-' + page);
  if (pageEl) pageEl.style.display = 'block';
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');
  document.getElementById('content').scrollTop = 0;
  APP.currentPage = page;
  if (page === 'home') renderHome();
  else if (page === 'browse') renderBrowse('all');
  else if (page === 'post') renderPost();
  else if (page === 'orders') renderOrders();
  else if (page === 'profile') renderProfile();
  else if (page === 'notifications') renderNotifications();
}

// ===== LISTING CARD =====
function listingCard(item) {
  const typeLabel = item.listing_type === 'swap' ? '🔄 Swap' : item.listing_type === 'sell' ? '💰 Sale' : '🔄💰 Both';
  const typeBadgeClass = item.listing_type === 'swap' ? 'badge-blue' : 'badge-green';
  const boostBadge = item.is_boosted ? `<span style="position:absolute;top:7px;left:7px;background:var(--gold);color:#000;font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px">⚡ FEATURED</span>` : '';
  return `
    <div class="card ${item.is_boosted ? 'featured' : ''}" onclick="showItemDetail(${item.id})" style="cursor:pointer">
      <div style="position:relative">
        <div class="listing-img-placeholder">${item.icon}</div>
        ${boostBadge}
        <span class="badge-pill ${typeBadgeClass}" style="position:absolute;top:7px;right:7px">${typeLabel}</span>
      </div>
      <div style="padding:10px">
        <div style="font-weight:600;font-size:13px;color:var(--text);margin-bottom:3px;line-height:1.3">${item.title}</div>
        <div style="font-size:11px;color:#666;margin-bottom:6px">${item.category} · ${item.condition}</div>

// ===== CHAT =====
function openChat(itemId) {
  const item = mockListings.find(l=>l.id===itemId);
  APP.chatItemTitle = item?.title || 'Amulet';
  APP.chatPartner = 'Mark Chua';
  APP.chatOrderId = `order-${itemId}`;
  APP.chatMessages = [
    { mine: false, text: `Hi! I saw your listing for "${APP.chatItemTitle}". Still available? 🙏`, time: '10:30 AM' },
    { mine: true, text: 'Yes it is! What do you have to offer in exchange?', time: '10:32 AM' },
    { mine: false, text: 'I have a Phra Somdej Wat Rakang in excellent condition. Interested?', time: '10:35 AM' },
  ];
  showChat();
}

function openOrderChat(itemTitle, other) {
  APP.chatItemTitle = itemTitle;
  APP.chatPartner = other.replace('with ','').replace('sold to ','');
  APP.chatOrderId = `order-${Date.now()}`;
  APP.chatMessages = [
    { mine: false, text: 'Thanks for the trade! When can we arrange the meetup? 🙏', time: 'Yesterday' },
    { mine: true, text: 'This weekend works for me. Saturday afternoon?', time: 'Yesterday' },
    { mine: false, text: 'Perfect! Saturday 2pm at the usual spot.', time: '9:00 AM' },
  ];
  showChat();
}

function showChat() {
  document.getElementById('chat-screen').style.display = 'flex';
  document.getElementById('chat-screen').style.flexDirection = 'column';
  document.getElementById('chat-avatar').textContent = APP.chatPartner[0];
  document.getElementById('chat-title').textContent = APP.chatPartner;
  document.getElementById('chat-subtitle').textContent = APP.chatItemTitle;
  renderChatMessages();
  lucide.createIcons();
  // Poll for new messages
  clearInterval(APP.pollInterval);
  APP.pollInterval = setInterval(() => {
    // In real app: fetch new messages from API
  }, 5000);
  setTimeout(() => {
    const msgs = document.getElementById('chat-messages');
    msgs.scrollTop = msgs.scrollHeight;
  }, 100);
}

function closeChat() {
  document.getElementById('chat-screen').style.display = 'none';
  clearInterval(APP.pollInterval);
}

function renderChatMessages() {
  const container = document.getElementById('chat-messages');
  container.innerHTML = APP.chatMessages.map(m => `
    <div style="display:flex;flex-direction:column;align-items:${m.mine?'flex-end':'flex-start'}">
      ${!m.mine?`<div style="font-size:10px;color:#555;margin-bottom:3px;margin-left:4px">${APP.chatPartner}</div>`:''}
      <div class="msg-bubble ${m.mine?'msg-mine':'msg-theirs'}">${m.text}</div>
      <div style="font-size:10px;color:#444;margin-top:3px;margin-${m.mine?'right':'left'}:4px">${m.time}</div>
    </div>`).join('');
  container.scrollTop = container.scrollHeight;
}

function sendMsg() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim(); if (!text) return;
  input.value = '';
  const now = new Date();
  const time = now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  APP.chatMessages.push({ mine: true, text, time });
  renderChatMessages();
  // Simulate reply after 1.5s
  setTimeout(() => {
    const replies = ['Sounds great! 🙏','Noted, let me check.','That works for me!','Can we meet this weekend?','Deal! I\'ll send you my address.'];
    APP.chatMessages.push({ mine: false, text: replies[Math.floor(Math.random()*replies.length)], time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
    renderChatMessages();
    sendPushNotification(`💬 ${APP.chatPartner}`, 'Replied to your message');
  }, 1500);
}
